name: Afternoon Prediction Refresh

on:
  schedule:
    # 毎日 04:00 UTC = 13:00 JST
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  afternoon:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Run afternoon prediction refresh
        run: npx tsx -r tsconfig-paths/register scripts/daily-pipeline.ts --job afternoon

      - name: Cleanup
        if: always()
        run: rm -f .env.local
