name: Emergency Regen Today Predictions

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/fix-ai-prediction-update-GBAYC

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Generate today predictions
        run: npx tsx -r tsconfig-paths/register scripts/regen-today.ts

      - name: Cleanup
        if: always()
        run: rm -f .env.local
