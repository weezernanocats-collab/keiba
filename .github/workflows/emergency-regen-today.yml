name: Emergency Regen Today Predictions

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/emergency-regen-today.yml'
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Step 1 - Morning pipeline (scrape races + entries + predictions)
        run: npx tsx -r tsconfig-paths/register scripts/daily-pipeline.ts --job morning

      - name: Step 2 - Regen all predictions for today
        run: npx tsx -r tsconfig-paths/register scripts/gen-predictions-optimized.ts --date 2026-03-28 --regen

      - name: Cleanup
        if: always()
        run: rm -f .env.local
