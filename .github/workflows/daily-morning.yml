name: Daily Morning Pipeline

on:
  schedule:
    # 毎日 21:00 UTC = 06:00 JST
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - odds
          - night

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Run morning pipeline (data fetch + predictions)
        run: npx tsx -r tsconfig-paths/register scripts/daily-pipeline.ts --job ${{ github.event.inputs.job || 'morning' }}

      - name: Cleanup
        if: always()
        run: rm -f .env.local
