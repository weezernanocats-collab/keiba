name: Daily Morning Pipeline

on:
  schedule:
    # Vercel Cron のバックアップとして毎日実行
    # 7:30 JST = 22:30 UTC (Vercel Cron 09:00 JST のバックアップ、重複回避)
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - odds
          - afternoon
          - results
          - night
          - cleanup

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Run morning pipeline (data fetch + predictions)
        run: npx tsx -r tsconfig-paths/register scripts/daily-pipeline.ts --job ${{ github.event.inputs.job || 'morning' }}

      - name: Fetch today's odds (当日オッズ取得)
        if: github.event.inputs.job == '' || github.event.inputs.job == 'morning'
        run: |
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          echo "Fetching odds for $TODAY"
          npx tsx scripts/fetch-odds.ts --date "$TODAY" --force

      - name: Regenerate predictions with odds (当日予想をオッズ反映で再生成)
        if: github.event.inputs.job == '' || github.event.inputs.job == 'morning'
        run: |
          TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
          echo "Regenerating predictions for $TODAY"
          npx tsx scripts/gen-predictions-optimized.ts --date "$TODAY" --regen

      - name: Send Shoshan email notifications (朝一しょーさん予想メール通知)
        if: github.event.inputs.job == '' || github.event.inputs.job == 'morning'
        run: |
            echo "GMAIL_USER=\"${{ secrets.GMAIL_USER }}\"" >> .env.local
            echo "GMAIL_APP_PASSWORD=\"${{ secrets.GMAIL_APP_PASSWORD }}\"" >> .env.local
            echo "NOTIFY_EMAIL_TO=\"${{ secrets.NOTIFY_EMAIL_TO }}\"" >> .env.local
            TODAY=$(date -u -d '+9 hours' '+%Y-%m-%d')
            npx tsx scripts/mail-notify.ts --date "$TODAY"

      - name: Cleanup
        if: always()
        run: rm -f .env.local
