name: XGBoost Model Training

on:
  schedule:
    # 毎週月曜 03:00 UTC (12:00 JST)
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install xgboost==2.0.3 scikit-learn==1.4.2 numpy==1.26.4 requests

      - name: Train XGBoost models
        env:
          VERCEL_URL: ${{ secrets.APP_URL }}
          SYNC_KEY: ${{ secrets.SYNC_KEY }}
        run: python scripts/train_model.py

      - name: Check for model changes
        id: check
        run: |
          if git diff --quiet model/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No model changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Model files updated"
          fi

      - name: Commit and push models
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/
          git commit -m "chore: XGBoost モデル自動再学習 ($(date -u +%Y-%m-%d))"
          git push
