name: Test Gemini API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Test Gemini models
        run: |
          for MODEL in gemini-flash-latest gemini-2.0-flash gemini-2.5-flash gemini-2.5-flash-lite; do
            echo "=== Testing $MODEL ==="
            HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -d '{"contents":[{"parts":[{"text":"Say hello"}]}],"generationConfig":{"maxOutputTokens":10}}' \
              --max-time 20 --connect-timeout 10)
            echo "HTTP: $HTTP_CODE"
            cat /tmp/resp.json | head -c 300
            echo ""
            echo ""
          done
