name: Daily Results Pipeline

on:
  schedule:
    # Vercel Cron のバックアップとして毎日実行
    # 17:30 JST = 08:30 UTC (Vercel Cron は 17:00 JST)
    # GitHub Actions は Vercel の 60秒制限がないため、大量レースも処理可能
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "TURSO_DATABASE_URL=\"${{ secrets.TURSO_DATABASE_URL }}\"" > .env.local
          echo "TURSO_AUTH_TOKEN=\"${{ secrets.TURSO_AUTH_TOKEN }}\"" >> .env.local

      - name: Run results pipeline (cleanup + results + accuracy verification)
        run: npx tsx -r tsconfig-paths/register scripts/daily-pipeline.ts --job results

      - name: Cleanup
        if: always()
        run: rm -f .env.local
